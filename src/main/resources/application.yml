spring:
  application:
    name: ai-chat-assistant
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7

app:
  routing:
    strategy: intent-based  # intent-based | keyword-based | default
  models:
    - name: gpt-4o
      description: "Most capable model for complex reasoning, code generation, and multi-step tasks"
      temperature: 0.7
    - name: gpt-4o-mini
      description: "Fast and cost-effective model for general chat and simple Q&A"
      temperature: 0.9

# Logging
logging:
  level:
    com.example.aichat: DEBUG
